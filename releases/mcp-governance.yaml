apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: mcp-security-governance
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/techwithhuz/mcp-security-governance
  ref:
    tag: v0.22.2
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-governance
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: mcp-governance
  install:
    createNamespace: true
  chart:
    spec:
      chart: charts/mcp-governance
      sourceRef:
        kind: GitRepository
        name: mcp-security-governance
        namespace: flux-system
  values:
    createNamespace: true
    governancePolicy:
      spec:
        aiAgent:
          enabled: false
