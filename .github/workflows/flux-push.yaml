name: Push releases as OCI artifact

on:
  push:
    tags:
      - 'v*'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifact
        id: push
        run: |
          set -x
          TAG=${GITHUB_REF_NAME#v}
          echo "TAG=${TAG}"
          echo "Repository: ${{ github.repository }}"
          echo "Artifact URL: oci://ghcr.io/${{ github.repository }}/releases:${TAG}"
          echo "--- releases/ directory contents ---"
          find ./releases -type f | sort
          echo "--- flux push artifact ---"
          flux push artifact oci://ghcr.io/${{ github.repository }}/releases:${TAG} \
            --path="./releases" \
            --source="${{ github.repositoryUrl }}" \
            --revision="${{ github.ref_name }}@sha1:${{ github.sha }}" \
            --verbose
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # Tag step disabled during push debugging
      # - name: Tag artifact as latest
      #   run: |
      #     flux tag artifact \
      #       oci://ghcr.io/${{ github.repository }}/releases:${{ steps.push.outputs.tag }} \
      #       --tag latest
