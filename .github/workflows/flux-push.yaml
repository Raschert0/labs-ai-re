name: Push releases as OCI artifact

on:
  push:
    tags:
      - 'v*'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@63281daf2f02c7a3c055dcef3bca3d3dbfcfbadd

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifact
        id: push
        run: |
          TAG=${GITHUB_REF_NAME#v}
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          digest=$(flux push artifact oci://ghcr.io/${REPO}/releases:${TAG} \
            --path="./releases" \
            --source="${{ github.repositoryUrl }}" \
            --revision="${{ github.ref_name }}@sha1:${{ github.sha }}" \
            --output json | jq -r '.digest')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Tag artifact as latest
        run: |
          flux tag artifact \
            oci://ghcr.io/${{ steps.push.outputs.repo }}/releases:${{ steps.push.outputs.tag }}@${{ steps.push.outputs.digest }} \
            --tag latest
