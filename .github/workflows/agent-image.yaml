name: Build and push agent image

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/agent-image.yaml'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          push: true
          tags: |
            ghcr.io/raschert0/ai-infra-advisor:latest
            ghcr.io/raschert0/ai-infra-advisor:${{ github.sha }}
